<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
            background:#111;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .login-box{
            background:#1e1e1e;
            padding:40px;
            border-radius:10px;
            width:320px;
            text-align:center;
            box-shadow:0 0 20px rgba(255,102,0,0.4);
        }

        .login-box h2{
            color:#ff6600;
            margin-bottom:20px;
        }

        .login-box input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:none;
            border-radius:5px;
            background:#333;
            color:white;
        }

        .login-box button{
            width:100%;
            padding:12px;
            background:#ff6600;
            color:white;
            border:none;
            border-radius:5px;
            font-weight:bold;
            cursor:pointer;
        }

        .login-box button:hover{
            background:#e65c00;
        }

        .back{
            display:block;
            margin-top:15px;
            color:#ff6600;
            text-decoration:none;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Admin Login</h2>

    <form action="admin_login.php" method="POST">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    <a href="index.html" class="back">Back to Home</a>
</div>

</body>
</html>
