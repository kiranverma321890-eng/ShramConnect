<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Worker Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: #222;
            padding: 40px;
            border-radius: 10px;
            width: 350px;
            text-align: center;
        }

        .login-box h1 {
            color: orange;
            margin-bottom: 20px;
        }

        .login-box input {
            width: 95%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            background: #333;
            color: white;
        }

        .login-box button {
            width: 50%;
            padding: 12px;
            background: orange;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #ff9933;
        }

        .login-box .form-footer {
            margin-top: 15px;
            font-size: 14px;
        }

        .login-box .form-footer a {
            color: orange;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>Worker Login</h1>
        <form action="workerlogin.php" method="POST">
            <input type="text" name="phone" placeholder="Phone Number" required>
            <input type="password" name="password" placeholder="Password" required>
            <br><br>
            <button type="submit">Login</button>
        </form><br>
        <div class="form-footer">
            New worker? <a href="worker_register.html">Register here</a>
        </div>
    </div>
</body>

</html>
